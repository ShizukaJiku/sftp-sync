name: CI

on:
  push:
    branches: [main, development]
    tags: ['v*']
  pull_request:
    branches: [main, development]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # Tests JVM rápidos. Corren en cada push y cada PR.
  # ─────────────────────────────────────────────────────────────
  jvm:
    name: JVM build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          cache: 'maven'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify JDK
        run: java --version

      - name: Compile
        run: mvn -B -ntp compile

      - name: Test
        run: mvn -B -ntp test

      - name: Verify --help works
        run: mvn -B -ntp -q exec:java "-Dexec.args=--help"

  # ─────────────────────────────────────────────────────────────
  # Binarios nativos. Costoso (~3–8 min por OS), corre solo en
  # push a main/development, tags, o disparo manual desde la UI.
  # PRs solo corren JVM tests para no quemar minutos.
  # ─────────────────────────────────────────────────────────────
  native:
    name: Native (${{ matrix.os }})
    needs: jvm
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sftp-sync-linux-x64
            binary: sftp-sync
          - os: windows-latest
            artifact: sftp-sync-windows-x64
            binary: sftp-sync.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 21
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          cache: 'maven'
          native-image-job-reports: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # native-image en Windows necesita el x64 Developer Command Prompt
      # (cl.exe + link.exe). Sin esto, el build falla con
      # "Failed to find 'vcvarsall.bat' in a Visual Studio installation".
      - name: Set up MSVC environment (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build native image
        run: mvn -B -ntp -Pnative package

      - name: Smoke test the binary
        shell: bash
        run: ./target/${{ matrix.binary }} --help

      # ─── Compresión UPX para reducir tamaño del binario ~75% ───
      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y upx-ucl

      # Windows: pineamos UPX 4.2.4 (no la 5.x más nueva de choco). Las versiones
      # 5.x de UPX tienen regresiones conocidas con PE32+ generados por
      # GraalVM Native Image — comprimen sin error pero el .exe resultante falla
      # al cargar con exit 193 (ERROR_BAD_EXE_FORMAT). 4.2.x es más conservador.
      - name: Install UPX 4.2.4 (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/upx/upx/releases/download/v4.2.4/upx-4.2.4-win64.zip -OutFile upx.zip
          Expand-Archive upx.zip -DestinationPath C:\upx -Force
          Add-Content $env:GITHUB_PATH "C:\upx\upx-4.2.4-win64"
          C:\upx\upx-4.2.4-win64\upx.exe --version

      # UPX en Windows: usamos -1 (compresión rápida, menos agresiva) que tiende
      # a producir binarios PE más estables que --best. En Linux ELF, --best --lzma
      # funciona bien (validado en v0.1.0). Si la compresión rompe el binario, lo
      # restauramos al original (best-effort: nunca bloquear el release por UPX).
      - name: Compress with UPX
        shell: bash
        run: |
          BIN=target/${{ matrix.binary }}
          ls -lh "$BIN"
          cp "$BIN" "$BIN.orig"
          if [[ "${{ runner.os }}" == "Linux" ]]; then
            upx --best --lzma "$BIN" || (echo "UPX failed, restoring"; cp "$BIN.orig" "$BIN")
          else
            upx -1 "$BIN" || (echo "UPX failed, restoring"; cp "$BIN.orig" "$BIN")
          fi
          if ! "$BIN" --help >/dev/null 2>&1; then
            echo "Compressed binary broken, restoring original"
            cp "$BIN.orig" "$BIN"
          fi
          rm -f "$BIN.orig"
          ls -lh "$BIN"

      - name: Verify final binary works
        shell: bash
        run: ./target/${{ matrix.binary }} --help

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # En tags vX.Y.Z: crear un GitHub Release y adjuntar binarios.
  # Solo desde main (tags se crean ahí).
  # ─────────────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: native
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename binaries to include platform
        run: |
          mv artifacts/sftp-sync-linux-x64/sftp-sync artifacts/sftp-sync-linux-x64.bin
          mv artifacts/sftp-sync-windows-x64/sftp-sync.exe artifacts/sftp-sync-windows-x64.exe

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/sftp-sync-linux-x64.bin
            artifacts/sftp-sync-windows-x64.exe
          generate_release_notes: true
