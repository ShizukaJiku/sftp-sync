name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # Tests JVM rápidos. Corren en cada push y cada PR.
  # ─────────────────────────────────────────────────────────────
  jvm:
    name: JVM build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          cache: 'maven'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify JDK
        run: java --version

      - name: Compile
        run: mvn -B -ntp compile

      - name: Test
        run: mvn -B -ntp test

      - name: Verify --help works
        run: mvn -B -ntp -q exec:java "-Dexec.args=--help"

  # ─────────────────────────────────────────────────────────────
  # Binarios nativos. Costoso (~3–8 min por OS), corre solo en
  # push a main, tags, o disparo manual desde la UI de Actions.
  # PRs solo corren JVM tests para no quemar minutos.
  # ─────────────────────────────────────────────────────────────
  native:
    name: Native (${{ matrix.os }})
    needs: jvm
    if: github.event_name != 'pull_request'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: sftp-sync-linux-x64
            binary: sftp-sync
          - os: windows-latest
            artifact: sftp-sync-windows-x64
            binary: sftp-sync.exe
          - os: macos-latest
            artifact: sftp-sync-macos-arm64
            binary: sftp-sync

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up GraalVM JDK 25
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm-community'
          cache: 'maven'
          native-image-job-reports: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build native image
        run: mvn -B -ntp -Pnative package

      - name: Smoke test the binary
        shell: bash
        run: ./target/${{ matrix.binary }} --help

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/${{ matrix.binary }}
          if-no-files-found: error
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # En tags vX.Y.Z: crear un GitHub Release y adjuntar los 3 binarios.
  # ─────────────────────────────────────────────────────────────
  release:
    name: Publish release
    needs: native
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/sftp-sync-linux-x64/sftp-sync
            artifacts/sftp-sync-windows-x64/sftp-sync.exe
            artifacts/sftp-sync-macos-arm64/sftp-sync
          generate_release_notes: true
